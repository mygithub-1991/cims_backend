name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check dependency graph
        run: python -m pip check

      - name: Compile application modules
        run: python -m compileall app

      - name: Validate Alembic migrations offline
        run: python -m alembic upgrade head --sql > /tmp/alembic.sql

      - name: Smoke import FastAPI app
        run: python -c "from app.main import app; print(app.title)"